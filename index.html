*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1A2332;--bg2:#1d2737;--bg3:#202c3d;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --text:#eef2f5;--text2:#c2cdd6;--text3:#8fa3ae;
  --accent:#6CA4AB;--accent2:#89bec5;--accent-bg:rgba(108,164,171,0.15);
  --green:#2dd4a0;--amber:#f59e0b;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --radius:10px;--radius-lg:16px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(12,12,14,0.92);backdrop-filter:blur(12px);z-index:10}
.nav-logo{font-family:var(--mono);font-size:14px;color:var(--text)}
.nav-logo span{color:var(--accent2)}
.nav-links{display:flex;gap:6px;align-items:center}
.nav-link{font-family:var(--mono);font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 14px;cursor:pointer;color:var(--text3);transition:all 0.12s;text-decoration:none;display:inline-block}
.nav-link:hover{color:var(--text);border-color:var(--border2)}
.nav-link.active{border-color:var(--accent);color:var(--accent2);background:var(--accent-bg)}
.nav-link.ext{font-family:var(--sans);background:none;border:none;color:var(--text3)}
.nav-link.ext:hover{color:var(--accent2)}

.hero{text-align:center;padding:2.25rem 2rem 0}
.hero-eyebrow{font-family:var(--mono);font-size:13px;color:var(--accent2);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.75rem}
.hero h1{font-size:clamp(22px,3.6vw,34px);font-weight:300;letter-spacing:-0.03em;margin-bottom:0.5rem;line-height:1.2}
.hero h1 strong{font-weight:500;color:#fff}
.hero p{font-size:14.5px;color:var(--text2);max-width:560px;margin:0 auto}

.wrap{max-width:1000px;margin:0 auto;padding:1.5rem 2rem 4rem}

/* map */
.map-box{display:flex;justify-content:center;padding:1rem 0 0.5rem}
.map-svg{width:100%;max-width:640px;height:auto}
.node-circle{fill:var(--bg3);stroke:var(--border2);stroke-width:1.5;transition:all 0.15s;cursor:pointer}
.node-circle:hover{stroke:var(--accent);fill:var(--accent-bg)}
.node-circle.center{fill:var(--bg2);stroke:var(--accent);stroke-width:2}
.node-label{fill:var(--text2);font-family:var(--sans);font-size:12.5px;font-weight:500;text-anchor:middle;pointer-events:none}
.node-label.center-label{fill:var(--text);font-size:11.5px;font-weight:500}
.node-count{fill:var(--text3);font-family:var(--mono);font-size:9.5px;text-anchor:middle;pointer-events:none}
.link-line{stroke:var(--border2);stroke-width:1;fill:none;opacity:0.45}
.cross-link{stroke:var(--accent);fill:none;stroke-linecap:round}
.node-pulse{fill:none;stroke:var(--accent);stroke-width:1.5;opacity:0.5;animation:pulse 2.6s ease-out infinite}
@keyframes pulse{
  0%{ r:58; opacity:0.5; }
  100%{ r:78; opacity:0; }
}

.map-hint{text-align:center;font-family:var(--mono);font-size:11.5px;color:var(--text3);margin-top:4px}

.browse-row{text-align:center;margin-top:1.25rem}
.browse-link{font-family:var(--mono);font-size:12.5px;color:var(--text3);cursor:pointer;text-decoration:underline;text-underline-offset:3px}

.all-list{display:flex;flex-direction:column;gap:8px}
.all-row{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;transition:border-color 0.12s}
.all-row:hover{border-color:var(--accent)}
.all-row img{width:52px;height:38px;object-fit:cover;object-position:top;border-radius:5px;flex:none;background:var(--bg3)}
.all-row .ar-name{font-size:13.5px;color:var(--text);font-weight:500;flex:1}
.all-row .ar-causal{font-family:var(--mono);font-size:11px;color:var(--text3);flex:none;white-space:nowrap}
.all-row .ar-cat{font-family:var(--mono);font-size:11px;color:var(--accent2);background:var(--accent-bg);padding:3px 9px;border-radius:20px;flex:none}
.all-row .ar-cat.ar-special{color:var(--green);background:rgba(45,212,160,0.12);border:1px solid rgba(45,212,160,0.3)}

.center-overview{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-top:1rem;display:none}

.center-overview h3{font-size:15px;font-weight:500;color:var(--text);margin-bottom:8px}
.center-overview p{font-size:13.5px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.center-overview .thumb-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12.5px;color:var(--accent2);cursor:pointer;text-decoration:none}

.cat-head{margin-bottom:1.25rem}
.cat-eyebrow{font-family:var(--mono);font-size:12px;color:var(--accent2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px}
.cat-title{font-size:24px;font-weight:500;color:#fff;margin-bottom:8px}
.cat-desc{font-size:14px;color:var(--text2);line-height:1.55;max-width:620px}

.model-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:14px;scroll-margin-top:80px;transition:border-color 0.3s}
.model-card.flash{border-color:var(--accent)}
.model-card-top{display:flex;gap:16px;align-items:flex-start;margin-bottom:12px}
.model-thumb{width:88px;height:66px;border-radius:6px;overflow:hidden;border:1px solid var(--border);cursor:zoom-in;flex:none;background:var(--bg3)}
.model-thumb img{width:100%;height:100%;object-fit:cover;object-position:top}
.model-head h4{font-size:16px;font-weight:500;color:var(--text);margin-bottom:4px}
.model-head .mechanism{font-size:13.5px;color:var(--accent2);font-style:italic;line-height:1.4}

.symptoms-label{font-family:var(--mono);font-size:10.5px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin:10px 0 6px}

.symptom-list li::before{content:'▸';color:var(--amber);flex:none;font-size:11px;margin-top:2px}

.key-insight{display:flex;gap:10px;align-items:flex-start;background:rgba(108,164,171,0.08);border-left:2px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 14px;margin:12px 0}

.key-insight .ki-text{font-size:13.5px;color:var(--text);line-height:1.55;font-style:italic}

.recommendation{margin-top:14px;padding:12px 14px;background:rgba(45,212,160,0.07);border:1px solid rgba(45,212,160,0.22);border-radius:8px}
.recommendation .rec-label{font-family:var(--mono);font-size:10.5px;color:var(--green);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px}
.recommendation .rec-text{font-size:13px;color:var(--text2);line-height:1.5}

.connected-label{font-family:var(--mono);font-size:10.5px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin:4px 0 6px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.12s;font-family:var(--sans)}
.chip:hover{border-color:var(--accent);color:var(--accent2)}
.chip-verb{font-style:italic;color:var(--accent2);font-size:11.5px}
.chip-in{border-style:dashed}

.trace-btn{
  margin-top:12px;background:none;border:1px dashed var(--border2);border-radius:8px;
  padding:8px 14px;font-size:12.5px;font-family:var(--mono);color:var(--accent2);cursor:pointer;transition:all 0.12s;
}
.trace-btn:hover{border-color:var(--accent);background:var(--accent-bg)}
.chain-panel{display:none;margin-top:12px;padding:14px 16px;background:var(--bg3);border-radius:10px;border:1px solid var(--border)}
.chain-panel.open{display:block}
.chain-label{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px}
.chain-flow{display:flex;flex-wrap:wrap;align-items:center;gap:6px;font-size:13px;line-height:1.8}
.chain-node{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;color:var(--text);cursor:pointer;transition:border-color 0.12s;font-weight:500}
.chain-node:hover{border-color:var(--accent)}
.chain-arrow{color:var(--text3);font-size:12px;white-space:nowrap}
.chain-arrow em{color:var(--accent2);font-style:italic}
.chain-empty{font-size:13px;color:var(--text3);font-style:italic}

.tool-card{background:rgba(108,164,171,0.08);border:1px solid rgba(108,164,171,0.25);border-radius:var(--radius-lg);padding:1.1rem 1.4rem;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.tool-card .tool-text h4{font-size:15px;color:var(--text);margin-bottom:4px}
.tool-card .tool-text p{font-size:13px;color:var(--text2)}
.cta-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;padding:10px 18px;font-size:13px;font-family:var(--sans);font-weight:500;border-radius:8px;cursor:pointer;text-decoration:none;transition:opacity 0.15s;white-space:nowrap}
.cta-btn:hover{opacity:0.85}

.back-row{margin-top:1.5rem}
.action-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;font-size:12.5px;font-family:var(--mono);color:var(--text2);cursor:pointer;transition:all 0.12s}
.action-btn:hover{border-color:var(--border2);color:var(--text)}

/* lightbox */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.open{display:flex}
.lightbox-img{max-width:100%;max-height:90vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-close{position:fixed;top:1.25rem;right:1.5rem;background:none;border:none;color:var(--text);font-size:26px;cursor:pointer;line-height:1}

footer{border-top:1px solid var(--border);padding:1.25rem 2rem;display:flex;flex-direction:column;gap:6px;max-width:1100px;margin:0 auto;font-size:13px;color:var(--text3);font-family:var(--mono);line-height:1.6}

@media(max-width:640px){
  .wrap{padding:1.25rem 1.25rem 3rem}
  nav{padding:0 1.25rem}
  .model-card-top{flex-direction:column}
}
</style>

const META_OVERVIEW = {

// find which category a model belongs to
function categoryOf(modelKey){
  return Object.entries(CATEGORIES).find(([k,c]) => c.models.includes(modelKey))?.[0];
}

// reverse lookup: which models drive INTO this one, and with what verb
function drivenBy(modelKey){
  const incoming = [];
  Object.entries(MODELS).forEach(([mk, m]) => {
    (m.causes || []).forEach(edge => {
      if(edge.to === modelKey) incoming.push({ from: mk, verb: edge.verb });
    });
  });
  return incoming;
}

// find the longest simple downstream causal chain starting from a model,
// following "causes" edges without revisiting a node (avoids the one mutual loop)
function longestChainFrom(startKey){
  let best = [];
  function dfs(node, path, visited){
    const outs = (MODELS[node].causes || []);
    let extended = false;
    outs.forEach(edge => {
      if(!visited.has(edge.to)){
        extended = true;
        visited.add(edge.to);
        path.push({ from: node, to: edge.to, verb: edge.verb });
        dfs(edge.to, path, visited);
        path.pop();
        visited.delete(edge.to);
      }
    });
    if(!extended && path.length > best.length) best = path.slice();
  }
  dfs(startKey, [], new Set([startKey]));
  return best;
}

function toggleChain(key){
  const panel = document.getElementById('chain-' + key);
  if(!panel) return;
  if(panel.classList.contains('open')){
    panel.classList.remove('open');
    return;
  }
  const chain = longestChainFrom(key);
  if(!chain.length){
    panel.innerHTML = `<div class="chain-empty">This model doesn't drive anything further downstream — it's an endpoint in the current graph.</div>`;
  } else {
    const nodeHtml = (k) => {
      const cat = categoryOf(k);
      return `<span class="chain-node" onclick="event.stopPropagation();showCategory('${cat}','${k}')">${MODELS[k].name}</span>`;
    };
    let html = `<div class="chain-label">Longest downstream chain (${chain.length} hop${chain.length>1?'s':''})</div><div class="chain-flow">`;
    html += nodeHtml(chain[0].from);
    chain.forEach(edge => {
      html += `<span class="chain-arrow">— <em>${edge.verb}</em> →</span>`;
      html += nodeHtml(edge.to);
    });
    html += `</div>`;
    panel.innerHTML = html;
  }
  panel.classList.add('open');
}

/* ---------------------------------------------------------
   Derive directed cross-category edges from model-level causal edges
--------------------------------------------------------- */
function computeCategoryEdges(){
  // "catA|catB" (alpha-sorted) -> { "catA>catB": weight, "catB>catA": weight }
  // no aggregation into a single "dominant" direction — every real direction is kept
  const edgeWeights = {};

  Object.entries(MODELS).forEach(([mk, m]) => {
    (m.causes || []).forEach(edge => {
      const ck = edge.to;
      const catA = categoryOf(mk);
      const catB = categoryOf(ck);
      if(!catA || !catB || catA === catB) return;

      const sortedKey = [catA, catB].sort().join('|');
      if(!edgeWeights[sortedKey]) edgeWeights[sortedKey] = {};
      const dirKey = catA + '>' + catB;
      edgeWeights[sortedKey][dirKey] = (edgeWeights[sortedKey][dirKey] || 0) + 1;
    });
  });

  return edgeWeights;
}

const CATEGORY_EDGES = computeCategoryEdges();

function categoryDegree(catKey){
  let deg = 0;
  Object.values(CATEGORY_EDGES).forEach(dirs => {
    Object.entries(dirs).forEach(([dirKey, w]) => {
      if(dirKey.split('>').includes(catKey)) deg += w;
    });
  });
  return deg;
}

/* ---------------------------------------------------------
   MAP VIEW — hub and spoke SVG
--------------------------------------------------------- */
function buildMapSVG(){
  const keys = Object.keys(CATEGORIES);
  const cx = 320, cy = 300, R = 210, centerR = 58;
  const positions = {};

  keys.forEach((k, i) => {
    const angle = (Math.PI * 2 * i / keys.length) - Math.PI/2;
    positions[k] = { x: cx + R * Math.cos(angle), y: cy + R * Math.sin(angle) };
  });

  // spoke lines (center -> each node), drawn faint so the cross-links stand out
  let spokes = "";
  keys.forEach(k => {
    const p = positions[k];
    spokes += `<line class="link-line" x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}"/>`;
  });

  // cross-category edges — every real direction gets its own arrow.
  // when two mechanisms influence each other both ways, that's two separate
  // curved arrows (bowing opposite ways), not one abstracted "mutual" line.
  let crossLinks = "";
  Object.entries(CATEGORY_EDGES).forEach(([pairKey, dirs]) => {
    const [a, b] = pairKey.split('|');
    const p1 = positions[a], p2 = positions[b];
    if(!p1 || !p2) return;

    Object.entries(dirs).forEach(([dirKey, weight]) => {
      const [fromKey, toKey] = dirKey.split('>');
      const start = positions[fromKey], end = positions[toKey];
      const mx = (start.x + end.x) / 2, my = (start.y + end.y) / 2;
      const dx = end.x - start.x, dy = end.y - start.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const sign = (fromKey === a) ? 1 : -1; // opposite curve per direction, so two arrows never overlap
      const offset = dist * 0.15 * sign;
      const px = -dy / dist * offset, py = dx / dist * offset;
      const ctrlX = mx + px, ctrlY = my + py;
      const strokeW = 1 + weight * 0.9;
      const opacity = 0.45 + Math.min(weight, 3) * 0.15;

      crossLinks += `<path class="cross-link" d="M ${start.x} ${start.y} Q ${ctrlX} ${ctrlY} ${end.x} ${end.y}" style="stroke-width:${strokeW};opacity:${opacity};" marker-end="url(#arrow)"/>`;
    });
  });

  // nodes, sized by total cross-category degree
  let nodes = "";
  keys.forEach(k => {
    const p = positions[k];
    const cat = CATEGORIES[k];
    const deg = categoryDegree(k);
    const nodeR = 38 + Math.min(deg, 6) * 2.4;
    nodes += `
      <g onclick="showCategory('${k}')" style="cursor:pointer;">
        <circle class="node-circle" cx="${p.x}" cy="${p.y}" r="${nodeR}"/>
        <text class="node-label" x="${p.x}" y="${p.y-2}">${cat.label}</text>
        <text class="node-count" x="${p.x}" y="${p.y+14}">${cat.models.length + (cat.tool?1:0)} model${cat.models.length>1?'s':''}</text>
      </g>
    `;
  });

  const svg = `
    <svg class="map-svg" viewBox="0 0 ${cx*2} ${cy*2}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#6CA4AB"/>
        </marker>
      </defs>
      ${spokes}
      ${crossLinks}
      ${nodes}
      <g onclick="toggleCenter()" style="cursor:pointer;">
        <circle class="node-pulse" cx="${cx}" cy="${cy}" r="${centerR}"/>
        <circle class="node-circle center" cx="${cx}" cy="${cy}" r="${centerR}"/>
        <text class="node-label center-label" x="${cx}" y="${cy-6}">AI Operational</text>
        <text class="node-label center-label" x="${cx}" y="${cy+10}">Pressure</text>
      </g>
    </svg>
  `;
  return svg;
}

function renderMap(){

      <h1>How AI pressure moves through an <strong>organisation</strong></h1>
      <p>Six mechanisms. Fifteen causally-linked models. Click a mechanism to see what's underneath it — and how it connects to the rest.</p>

/* ---------------------------------------------------------
   CATEGORY VIEW
--------------------------------------------------------- */
function showCategory(key, highlightModel){
  view = "category";
  setActiveNav();
  const cat = CATEGORIES[key];

  const modelCards = cat.models.map(mk => renderModelCard(mk)).join('');
  const toolCard = cat.tool ? renderToolCard(cat.tool) : '';

  app.innerHTML = `
    <div class="wrap">
      <div class="cat-head">
        <div class="cat-eyebrow">Mechanism</div>
        <div class="cat-title">${cat.label}</div>
        <div class="cat-desc">${cat.desc}</div>
      </div>
      ${modelCards}
      ${toolCard}
      <div class="back-row">
        <button class="action-btn" onclick="showMap()">← Back to the map</button>
      </div>
    </div>
  `;

  if(highlightModel){
    setTimeout(() => {
      const el = document.getElementById('model-' + highlightModel);
      if(el){
        el.scrollIntoView({behavior:'smooth', block:'center'});
        el.classList.add('flash');
        setTimeout(() => el.classList.remove('flash'), 1400);
      }
    }, 60);
  }
}

function renderModelCard(key){
  const m = MODELS[key];
  const outgoing = m.causes || [];
  const incoming = drivenBy(key);

  const chipsOut = outgoing.map(edge => {
    const cm = MODELS[edge.to];
    const targetCat = categoryOf(edge.to);
    return `<div class="chip chip-out" onclick="showCategory('${targetCat}','${edge.to}')"><span class="chip-verb">${edge.verb}</span> ${cm.name}</div>`;
  }).join('');

  const chipsIn = incoming.map(edge => {
    const cm = MODELS[edge.from];
    const sourceCat = categoryOf(edge.from);
    return `<div class="chip chip-in" onclick="showCategory('${sourceCat}','${edge.from}')">${cm.name} <span class="chip-verb">${edge.verb}</span></div>`;
  }).join('');

  return `
    <div class="model-card" id="model-${key}">
      <div class="model-card-top">
        <div class="model-thumb" onclick="openLightbox('${m.img}','${m.name}')">
          <img src="${m.img}" alt="${m.name}">
        </div>
        <div class="model-head">
          <h4>${m.name}</h4>
          <div class="mechanism">${m.mechanism}</div>
        </div>
      </div>
      <div class="symptoms-label">Common symptoms</div>
      <ul class="symptom-list">
        ${m.symptoms.map(s => `<li>${s}</li>`).join('')}
      </ul>
      <div class="key-insight">
        <div class="ki-mark">"</div>
        <div class="ki-text">${m.keyInsight}</div>
      </div>
      ${outgoing.length ? `
        <div class="connected-label">Drives →</div>
        <div class="chip-row">${chipsOut}</div>
      ` : ''}
      ${incoming.length ? `
        <div class="connected-label" style="margin-top:10px;">← Driven by</div>
        <div class="chip-row">${chipsIn}</div>
      ` : ''}
      <div class="recommendation">
        <div class="rec-label">Recommended focus</div>
        <div class="rec-text">${m.recommendation}</div>
      </div>
      ${outgoing.length ? `
        <button class="trace-btn" onclick="toggleChain('${key}')">Trace the chain →</button>
        <div class="chain-panel" id="chain-${key}"></div>
      ` : ''}
    </div>
  `;
}

function renderToolCard(toolKey){
  const t = TOOLS[toolKey];
  return `
    <div class="tool-card">
      <div class="tool-text">
        <h4>${t.name}</h4>
        <p>${t.desc}</p>
        <div class="key-insight" style="margin:10px 0 0;">
          <div class="ki-mark">"</div>
          <div class="ki-text">${t.keyInsight}</div>
        </div>
      </div>
      <a class="cta-btn" href="${t.href}" target="_blank" rel="noopener">${t.cta} →</a>
    </div>
  `;
}

    return `
      <div class="all-row" onclick="showCategory('${cat}','${k}')">
        <img src="${m.img}" alt="${m.name}">
        <div class="ar-name">${m.name}</div>
        <div class="ar-causal" title="${outCount} outgoing / ${inCount} incoming causal edges">→${outCount} &nbsp; ←${inCount}</div>
        <div class="ar-cat">${CATEGORIES[cat].label}</div>
      </div>
    `;
  }).join('');

  const overviewRow = `
    <div class="all-row" onclick="showMap();setTimeout(toggleCenter,50);">
      <img src="${META_OVERVIEW.img}" alt="${META_OVERVIEW.title}">
      <div class="ar-name">${META_OVERVIEW.title}</div>
      <div class="ar-causal" title="Overview poster — sits above all six mechanisms, not inside the causal graph">—</div>
      <div class="ar-cat ar-special">Overview</div>
    </div>
  `;

  const toolRow = `
    <div class="all-row" onclick="showCategory('cost')">
      <img src="${TOOLS.costSimulator.img}" alt="${TOOLS.costSimulator.name}">

      <div class="ar-causal" title="Tool — not part of the causal graph">—</div>
      <div class="ar-cat ar-special">Tool</div>
    </div>
  `;

  app.innerHTML = `
    <div class="hero">
      <div class="hero-eyebrow">Index</div>
      <h1>All 17 assets, <strong>indexed</strong></h1>
      <p>15 models with causal edges, one framework overview poster, and one tool. This is a lookup, not the framework itself — the → and ← counts show how connected each model is. For the actual mechanics, use the map.</p>
    </div>
    <div class="wrap">
      <div class="all-list">${overviewRow}${modelRows}${toolRow}</div>
      <div class="back-row">
        <button class="action-btn" onclick="showMap()">← Back to the map</button>
      </div>
    </div>
  `;
}

window.showMap=showMap; window.showCategory=showCategory; window.toggleCenter=toggleCenter; window.showAll=showAll;
